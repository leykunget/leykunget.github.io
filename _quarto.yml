project:
  type: website
  output-dir: docs

website:
  title: "Leykun Getaneh"

  navbar:
    left:
      - file: index.qmd
        text: "Home"
      - publication.qmd
      - resume.qmd
      - projects.qmd
      - training.qmd

    tools:
      - icon: twitter
        href: https://x.com/likutta
        aria-label: Twitter / X
      - icon: github
        href: https://github.com/leykunget
        aria-label: GitHub
      - icon: envelope
        href: mailto:leyk.get@gmail.com
        aria-label: Email
      - icon: linkedin
        href: https://www.linkedin.com/in/leykun-getaneh-gebeye-39a17890/
        aria-label: LinkedIn

  page-footer:
    right: "Built with [Quarto](https://quarto.org/)"
    left: "&copy; 2025 Leykun Getaneh"
    background: "#0E1117"

format:
  html:
    grid:
      body-width: 860px
      sidebar-width: 220px
      margin-width: 220px

    theme:
      light: [cerulean, styles.scss]
      dark:  [cosmo, theme_dark_custom.scss, styles.scss]

    include-in-header:
      text: |
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    toc: true
    toc-depth: 3
    citations-hover: true
    code-link: true
    code-fold: show
    code-tools: false
    code-block-border-left: "#006D6E"
    code-copy: true
    smooth-scroll: true
    anchor-sections: true

editor: source
